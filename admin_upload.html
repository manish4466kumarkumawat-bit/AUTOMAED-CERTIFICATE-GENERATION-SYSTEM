<!DOCTYPE html>
<html>
<head>
    <title>Bulk Upload Certificates | Blockchain Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; }
        .box {
            width: 450px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
        h2 { color: #2c3e50; margin-top: 0; font-size: 22px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        select, input[type="file"] { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; 
        }
        button {
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #1976D2; }
        .back-link { text-decoration: none; color: #777; font-size: 14px; display: inline-block; margin-bottom: 20px; transition: 0.2s; }
        .back-link:hover { color: #2196F3; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 6px; font-size: 14px; color: #0d47a1; }
    </style>
</head>
<body>

<div class="box">
    <a href="/admin/dashboard" class="back-link"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
    
    <h2><i class="fa fa-file-excel"></i> Bulk Certificate Upload</h2>

    <form method="POST" action="/admin/upload" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>1. Select Design Template</label>
            <select name="template_id" required>
                <option value="">-- Choose Template --</option>
                {% for t in templates %}
                <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>2. Choose Student Data (Excel/CSV)</label>
            <input type="file" name="excel" accept=".xls,.xlsx,.csv" required>
        </div>

        <button type="submit"><i class="fa fa-magic"></i> Generate Certificates</button>
    </form>

    <hr>

    <div class="info">
        <b>Required Excel Columns:</b><br>
        <code>name</code> | <code>course</code>
        <p style="margin-top:10px; font-size: 12px; color: #555;">
            * Make sure the column headers match exactly.
        </p>
    </div>
</div>

</body>
</html>
